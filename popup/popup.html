<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>字幕摘要</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <div class="seal" aria-hidden="true">AI</div>
        <div class="brand">
          <h1>字幕摘要</h1>
          <p id="status">正在读取当前页面</p>
        </div>
      </header>

      <section class="info">
        <div>
          <span>平台</span>
          <strong id="platform">—</strong>
        </div>
        <div class="rule"></div>
        <div>
          <span>字幕轨</span>
          <strong id="tracks">—</strong>
        </div>
      </section>

      <div class="actions">
        <button id="summarize" class="primary" type="button">解析当前视频</button>
        <button id="togglePanel" type="button">显示 / 收起面板</button>
        <button id="openOptions" class="ghost" type="button">设置</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
